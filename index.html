<!DOCTYPE html>
<html lang="en">

<head>

    <title>Jarel's Barbershop</title>

<body>
    <header>
        <div class="nav-links">
            <nav>

                <div class="service">

            </div>

        <section class="gallery">

        </section>

        </section>

        </section>
